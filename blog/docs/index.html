<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="橙子博客 - 记录技术与生活">
    <title>橙子博客 | 技术生活记录</title>
    <style>
        /* 基础重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 颜色变量 */
        :root {
            --primary-orange: #FF6F61;
            --secondary-orange: #FFA577;
            --light-orange: #FFE4D6;
            --dark-orange: #E65C50;
            --background-color: #FF6B35;
            --text-dark: #333333;
            --text-light: #666666;
            --white: #FFFFFF;
        }

        /* 基础排版 */
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            line-height: 1.7;
            background-color: var(--background-color);
            color: var(--text-dark);
        }

        h1 { font-size: 2.5rem; }
        h2 { font-size: 2rem; }
        h3 { font-size: 1.5rem; }
        p { margin-bottom: 1.2rem; }

        /* 导航栏 */
        .navbar {
            background: var(--white);
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            color: var(--primary-orange);
            font-size: 1.8rem;
            font-weight: 700;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .brand:hover {
            opacity: 0.8;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 500;
            position: relative;
            padding: 0.3rem 0;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary-orange);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .menu-toggle {
            display: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: var(--primary-orange);
        }

        /* 主体内容 */
        .container {
            max-width: 800px;
            margin: 100px auto 40px;
            padding: 0 2rem;
        }

        /* 文章卡片 */
        .post-card {
            background: var(--white);
            border-radius: 12px;
            padding: 2.5rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease;
        }

        .post-card:hover {
            transform: translateY(-3px);
        }

        .post-date {
            color: var(--secondary-orange);
            font-size: 0.9rem;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .post-date::before {
            content: '📅';
            font-size: 1.1rem;
        }

        .post-title {
            color: var(--primary-orange);
            margin: 1rem 0;
            line-height: 1.3;
        }

        .post-excerpt {
            color: var(--text-light);
            margin-bottom: 1.5rem;
        }

        .read-more {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.5rem;
            background: linear-gradient(135deg, var(--primary-orange), var(--secondary-orange));
            color: var(--white);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .read-more:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 111, 97, 0.3);
        }

        /* 页脚 */
        footer {
            background: var(--white);
            margin-top: 5rem;
            padding: 3rem 2rem;
            text-align: center;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin: 1.5rem 0;
        }

        .social-links a {
            color: var(--text-light);
            font-size: 1.5rem;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: var(--primary-orange);
        }

        .copyright {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        /* 响应式设计 */
        @media screen and (max-width: 768px) {
            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: var(--white);
                flex-direction: column;
                padding: 1rem;
                box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
            }

            .nav-links.active {
                display: flex;
            }

            .menu-toggle {
                display: block;
            }

            .container {
                margin-top: 80px;
                padding: 0 1rem;
            }

            .post-card {
                padding: 1.5rem;
            }
        }

        @media screen and (max-width: 480px) {
            .brand {
                font-size: 1.5rem;
            }

            .post-title {
                font-size: 1.7rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="brand">🍊 橙子博客</a>
            <ul class="nav-links">
                <li><a href="#home">首页</a></li>
                <li><a href="#archive">归档</a></li>
                <li><a href="#about">关于</a></li>
                <li><a href="#contact">联系</a></li>
            </ul>
            <div class="menu-toggle" aria-label="导航菜单">☰</div>
        </div>
    </nav>

    <main class="container">
        <!-- 文章列表 -->
        <article class="post-card">
            <div class="post-date">2024年3月18日</div>
            <h2 class="post-title">探索前端动画的新趋势</h2>
            <p class="post-excerpt">本文将深入探讨现代Web动画技术的发展，包括CSS3动画、WebGL应用以及最新的Lottie动画实现方案...</p>
            <a href="#" class="read-more">
                <span>阅读全文</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </a>
        </article>

        <article class="post-card">
            <div class="post-date">2024年3月17日</div>
            <h2 class="post-title">GitHub Actions自动化部署指南</h2>
            <p class="post-excerpt">手把手教你如何配置GitHub Actions实现静态网站的自动部署与持续集成...</p>
            <a href="#" class="read-more">
                <span>阅读全文</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </a>
        </article>
    </main>

    <footer>
        <div class="footer-content">
            <div class="social-links">
                <a href="#" aria-label="GitHub"><i class="fab fa-github"></i></a>
                <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
                <a href="#" aria-label="Email"><i class="fas fa-envelope"></i></a>
            </div>
            <p class="copyright">© 2024 橙子博客 | 基于 GitHub Pages 构建 | 保留所有权利</p>
        </div>
    </footer>

    <script>
        // 移动端菜单切换
        const menuToggle = document.querySelector('.menu-toggle');
        const navLinks = document.querySelector('.nav-links');

        function toggleMenu() {
            navLinks.classList.toggle('active');
            menuToggle.textContent = navLinks.classList.contains('active') ? '×' : '☰';
        }

        menuToggle.addEventListener('click', toggleMenu);

        // 点击外部关闭菜单
        document.addEventListener('click', (event) => {
            if (!event.target.closest('.nav-container') && navLinks.classList.contains('active')) {
                toggleMenu();
            }
        });

        // 平滑滚动
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });

        // 动态加载Font Awesome
        const loadFontAwesome = () => {
            const fa = document.createElement('link');
            fa.rel = 'stylesheet';
            fa.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css';
            document.head.appendChild(fa);
        };

        window.addEventListener('DOMContentLoaded', loadFontAwesome);
    </script>
</body>
</html>
